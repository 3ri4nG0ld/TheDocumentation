site_name: La documentación
site_url: https://3ri4ng0ld.github.io/docs
repo_url: https://github.com/3ri4ng0ld/docs
repo_name: GitHub
edit_uri: blob/main/docs/


theme:
  language: es 
  font:
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.indexes # Permite añadir un Index.md a cada carpeta (para que dicho Index)

  name: material
  custom_dir: overrides
  palette: 

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  #alternate:
  #- name: English
  #  link: /en/ 
  #  lang: en
  #- name: Español
  #  link: /es/
  #  lang: es

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/3ri4nG0ld/docs
  



extra_css:
  - stylesheets/extra.css

# syntax highlighting (https://squidfunk.github.io/mkdocs-material/reference/code-blocks/#configuration)
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
      - name: python
        class: python
        validator: !!python/name:markdown_exec.validator
        format: !!python/name:markdown_exec.formatter
  - toc:
      permalink: "#"


plugins:
  - search:
      lang: es
  - tags
  # https://github.com/danielfrg/mkdocs-jupyter
  - mkdocs-jupyter:
      include: ["*.ipynb"]
      execute: false
      include_source: true
  - markdown-exec
